name: Publish to GitHub Pages

# Every time code lands on main, copy it to the gh-pages branch,
# which is what GitHub Pages serves at https://mylesaway.github.io/clipped/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push --force origin HEAD:gh-pages
